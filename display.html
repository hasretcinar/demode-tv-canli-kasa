<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yayın Ekranı - Demode TV Canlı Kasa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="display-page">
<button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Tam Ekran</button>

<div class="app">
  <main class="panel main-panel">
    <header class="header">
      <div class="logo">💸 Demode TV Canlı Kasa</div>
      <div class="status">
        <span>Oda: <strong id="hRoom">-</strong></span>
        <span>Durum: <strong id="hPhase">-</strong></span>
        <span>Soru: <strong id="hRound">-</strong></span>
        <span>Süre: <strong id="timerText">-</strong></span>
      </div>
    </header>
    <section class="content">
      <div id="questionArea"></div>
      <div id="resultsBox"></div>
    </section>

      <div class="contestant-showcase" aria-label="Yarışmacılar">
        <div class="contestant-chip">
          <div class="contestant-thumb"><img src="assets/contestants/mehmet_atar.png" alt="Mehmet Atar"></div>
          <div class="contestant-name">MEHMET ATAR</div>
        </div>
        <div class="contestant-chip">
          <div class="contestant-thumb"><img src="assets/contestants/berke_yoldas.png" alt="Berke Yoldaş"></div>
          <div class="contestant-name">BERKE YOLDAŞ</div>
        </div>
        <div class="contestant-chip">
          <div class="contestant-thumb"><img src="assets/contestants/yalcin_rohde.png" alt="Yalçın Rohde"></div>
          <div class="contestant-name">YALÇIN ROHDE</div>
        </div>
        <div class="contestant-chip">
          <div class="contestant-thumb"><img src="assets/contestants/ronvisli.png" alt="Ronvisli"></div>
          <div class="contestant-name">RONVİSLİ</div>
        </div>
      </div>

  </main>

  <aside class="side-panel">
    <section class="side-card">
      <div class="side-title">Canlı Sıralama</div>
      <div class="side-body players" id="playersBox"></div>
    </section>
  </aside>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="game.js"></script>
<script>
let roomCode = qs("room") || prompt("Yayın ekranı için oda kodu:");
let state = null;
let activeRef = null;

function listenRoom(code){
  activeRef = roomRef(code);
  activeRef.on("value", snap=>{
    state = snap.val();
    if(!state) return;
    renderHeader(state);
    renderQuestion(state);
    renderPlayers(state);
    renderResults(state);
  });
}

startLocalTick(()=>{ if(state){ renderTimer(state); } });

if(roomCode){
  roomCode = roomCode.toUpperCase();
  listenRoom(roomCode);
}
</script>
</body>
</html>
